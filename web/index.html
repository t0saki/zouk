<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/zouk.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zouk - Team Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Fira+Code:wght@400;500&family=IBM+Plex+Mono:wght@400;500;700&family=Libre+Franklin:wght@400;500;600;700;800&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      (function(){
        var t=localStorage.getItem('zouk_theme');
        var theme=(t==='night-city'||t==='brutalist'||t==='washington-post')?t:'night-city';
        document.documentElement.setAttribute('data-theme',theme);
        var favicon=document.querySelector("link[rel='icon']");
        if(favicon) favicon.href=theme==='night-city'?'/zouk-night-city.svg':'/zouk.svg';
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
